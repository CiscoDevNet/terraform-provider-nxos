---
name: Loopback Interfaces
class_name: interfaceEntity
dn: sys/intf
no_delete: true
ds_description: This data source can read loopback interface configurations on NX-OS devices, including administrative state, description, and VRF membership.
res_description: This resource can manage loopback interface configurations on NX-OS devices, including administrative state, description, and VRF membership.
doc_category: Interface
child_classes:
  - class_name: l3LbRtdIf
    doc_path: Layer%203/l3:LbRtdIf/
    rn: lb-[%s]
    type: list
    tf_name: loopback_interfaces
    description: 'List of loopback interfaces.'
    attributes:
      - nxos_name: id
        tf_name: interface_id
        type: String
        id: true
        description: 'Must match first field in the output of `show intf brief`. Example: `lo123`.'
        example: lo123
      - nxos_name: adminSt
        tf_name: admin_state
        type: String
        description: 'Administrative state.'
        enum_values:
          - down
          - up
        example: down
      - nxos_name: descr
        tf_name: description
        type: String
        description: 'Interface description.'
        example: My Description
      - nxos_name: linkLog
        tf_name: link_logging
        type: String
        description: 'The administrative state of link logging.'
        enum_values:
          - default
          - enable
          - disable
        example: enable
    child_classes:
      - class_name: nwRtVrfMbr
        rn: rtvrfMbr
        type: single
        doc_path: Routing%20and%20Forwarding/nw:RtVrfMbr/
        attributes:
          - nxos_name: tDn
            tf_name: vrf_dn
            type: String
            description: 'DN of VRF. For example: `sys/inst-VRF1`.'
            example: sys/inst-default
