                type: String
                id: true
                description: 'snmp-server user name.'
                example: network-operator
      - class_name: snmpHost
        doc_path: System/snmp:Host/
        rn: host-[%s]-udp-[%d]
        type: list
        tf_name: hosts
        description: 'List of SNMP host configurations.'
        attributes:
          - nxos_name: hostName
            tf_name: name
            type: String
            id: true
            description: 'snmp-server host name.'
            example: 10.0.0.1
          - nxos_name: udpPortID
            tf_name: udp_port
            type: Int64
            id: true
            min_int: 0
            max_int: 65535
            description: 'snmp-server host udp-port.'
            example: 1162
          - nxos_name: commName
            tf_name: community_name
            type: String
            description: 'community to be associated to the host.'
            example: public
          - nxos_name: notifType
            tf_name: notification_type
            type: String
            description: 'Ctrl bits indicating traps/informs config.'
            enum_values:
              - traps
              - informs
            example: traps
          - nxos_name: secLevel
            tf_name: security_level
            type: String
            description: 'Ctrl bits indicating auth/ priv/ noauth for v3.'
            enum_values:
              - unspecified
              - noauth
              - auth
              - priv
            example: auth
          - nxos_name: version
            tf_name: version
            type: String
            description: 'Ctrl bits indicating version.'
            enum_values:
              - v1
              - v2c
              - v3
            example: v3
