              - lpd
              - talk
              - rip
              - uucp
              - klogin
              - kshell
              - drip
              - non500-isakmp
            allow_non_enum_values: true
            description: "First port number or name."
            example: 443
          - nxos_name: port2
            tf_name: port_2
            type: String
            enum_values:
              - echo
              - discard
              - daytime
              - chargen
              - ftp-data
              - ftp
