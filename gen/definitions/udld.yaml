---
name: UDLD
class_name: udldEntity
dn: sys/udld
no_delete: true
ds_description: This data source can read the UDLD configuration on NX-OS devices, including global settings and per-interface UDLD configuration such as aggressive mode and bidirectional detection.
res_description: This resource can manage the UDLD configuration on NX-OS devices, including global settings and per-interface UDLD configuration such as aggressive mode and bidirectional detection.
doc_path: Discovery%20Protocols/udld:Entity/
doc_category: Switching
attributes:
  - nxos_name: adminSt
    tf_name: admin_state
    type: String
    write_only: true
    enum_values:
      - enabled
      - disabled
    description: "The administrative state of the object or policy."
    example: enabled
child_classes:
  - class_name: udldInst
    rn: inst
    type: single
    no_delete: true
    tf_name: instance
    description: 'UDLD instance configuration.'
    doc_path: Discovery%20Protocols/udld:Inst/
    attributes:
      - nxos_name: aggressive
        tf_name: aggressive
        type: String
        enum_values:
          - enabled
          - disabled
        description: "Global Aggressive Mode."
        example: enabled
      - nxos_name: msgIntvl
        tf_name: message_interval
        type: Int64
        min_int: 7
        max_int: 90
        description: "Probe Message Interval."
        example: 20
    child_classes:
      - class_name: udldPhysIf
        rn: physif-[%s]
        type: list
        tf_name: interfaces
        description: 'List of UDLD interfaces.'
        doc_path: Discovery%20Protocols/udld:PhysIf/
        attributes:
          - nxos_name: id
            tf_name: interface_id
            type: String
            id: true
            description: "Must match first field in the output of `show intf brief`. Example: `eth1/1`."
            example: eth1/9
          - nxos_name: adminSt
            tf_name: admin_state
            type: String
            write_only: true
            enum_values:
              - port-enabled
              - port-fiber-disabled
              - port-default
              - port-default-disable
            description: "UDLD enable/disable per port."
            example: port-enabled
          - nxos_name: aggressive
            tf_name: aggressive
            type: String
            enum_values:
              - enabled
              - disabled
            description: "Interface Aggressive Mode."
            example: enabled
          - nxos_name: biDirDetect
            tf_name: bidirectional_detection
            type: String
            enum_values:
              - port-enabled
              - port-fiber-disabled
              - port-default
              - port-default-disable
            description: "Bidirectional Detection Enabled."
            example: port-enabled
test_prerequisites:
  - dn: sys/fm/udld
    class_name: fmUdld
    attributes:
      - name: adminSt
        value: enabled
