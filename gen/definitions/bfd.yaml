---
name: BFD
class_name: bfdEntity
dn: sys/bfd
ds_description: 'This data source can read the BFD configuration on NX-OS devices, including BFD instance settings, interface-level keepalive policies, and authentication settings.'
res_description: 'This resource can manage the BFD configuration on NX-OS devices, including BFD instance settings, interface-level keepalive policies, and authentication settings.'
doc_path: Routing%20and%20Forwarding/bfd:Entity/
doc_category: Routing
attributes:
  - nxos_name: adminSt
    tf_name: admin_state
    type: String
    description: 'The administrative state of the object or policy.'
    enum_values:
      - enabled
      - disabled
    example: enabled
child_classes:
  - class_name: bfdInst
    doc_path: Routing%20and%20Forwarding/bfd:Inst/
    rn: inst
    type: single
    tf_name: instance
    description: 'BFD instance configuration.'
    attributes:
      - nxos_name: adminSt
        tf_name: instance_admin_state
        type: String
        description: 'The administrative state of the object or policy.'
        enum_values:
          - enabled
          - disabled
        example: enabled
      - nxos_name: ctrl
        tf_name: instance_control
        type: String
        description: 'The control state.'
        enum_values:
          - stateful-ha
        allow_non_enum_values: true
        example: stateful-ha
      - nxos_name: echoIf
        tf_name: echo_interface
        type: String
        description: 'Echo Interface to be used for BFD echo frames.'
        example: lo10
      - nxos_name: hwOffload
        tf_name: hardware_offload
        type: String
        description: 'Enable or Disable offloading of BFD sessions to hardware.'
        enum_values:
          - disable
          - enable
        example: enable
      - nxos_name: slowIntvl
        tf_name: slow_interval
        type: Int64
        min_int: 1000
        max_int: 30000
        description: 'Slow timer Interval.'
        example: 3000
      - nxos_name: startupIntvl
        tf_name: startup_interval
        type: Int64
        min_int: 0
        max_int: 60
        description: 'Startup timer Interval.'
        example: 10
    child_classes:
      - class_name: bfdIf
        doc_path: Routing%20and%20Forwarding/bfd:If/
        rn: if-[%s]
        type: list
        tf_name: interfaces
        description: 'List of BFD interfaces.'
        attributes:
          - nxos_name: id
            tf_name: interface_id
            type: String
            id: true
            description: 'Must match first field in the output of `show intf brief`. Example: `eth1/1`.'
            example: vlan10
          - nxos_name: adminSt
            tf_name: admin_state
            type: String
            description: 'The administrative state of the object or policy.'
            enum_values:
              - enabled
              - disabled
            example: enabled
          - nxos_name: ctrl
            tf_name: control
            type: String
            description: 'Interface Controls.'
            enum_values:
              - opt-subif
              - pc-per-link
            allow_non_enum_values: true
            exclude_test: true
            example: opt-subif
          - nxos_name: dst
            tf_name: destination
            type: String
            description: 'Destination IP Address.'
            exclude_test: true
            example: 10.1.1.1
          - nxos_name: echoAdminSt
            tf_name: echo_admin_state
            type: String
            description: 'Echo Mode Admin State of BFD Interface.'
            enum_values:
              - enabled
              - disabled
            example: disabled
          - nxos_name: srcIp
            tf_name: source_ip
            type: String
            description: 'Source IPv4/IPv6 Address for BFD sessions.'
            exclude_test: true
            example: 10.1.1.2
          - nxos_name: stTm
            tf_name: start_timeout
            type: Int64
            min_int: 0
            max_int: 4294967295
            description: 'BFD Start timeout.'
            example: 10
          - nxos_name: trkMbrLnk
            tf_name: track_member_link
            type: String
            description: 'Track Member Link Enable Disable on bfd interface.'
            enum_values:
              - disable
              - enable
            exclude_test: true
            example: enable
          - nxos_name: vpcWatch
            tf_name: vpc_watch
            type: String
            description: 'Broadcast vpc-watch session state notification to subscribers.'
            enum_values:
              - disable
              - enable
            exclude_test: true
            example: enable
        child_classes:
          - class_name: bfdIfKaP
            doc_path: Routing%20and%20Forwarding/bfd:IfKaP/
            rn: ifka
            type: single
            tf_name: keepalive
            description: 'BFD interface keepalive policy.'
            attributes:
              - nxos_name: detectMult
                tf_name: detect_multiplier
                type: Int64
                min_int: 0
                max_int: 50
                description: 'Detection Multiplier. This is the desired detection time multiplier for BFD packets on the local system.'
                example: 5
              - nxos_name: echoRxIntvl
                tf_name: echo_receive_interval
                type: Int64
                min_int: 0
                max_int: 999
                description: 'Echo Rx Interval. This is the minimum interval, in ms, between received BFD echo packets that this system is capable of supporting.'
                example: 100
              - nxos_name: minRxIntvl
                tf_name: min_receive_interval
                type: Int64
                min_int: 0
                max_int: 999
                description: 'Required Minimum RX Interval. This is the minimum interval, in ms, between received BFD control packets that this system is capable of supporting.'
                example: 100
              - nxos_name: minTxIntvl
                tf_name: min_transmit_interval
                type: Int64
                min_int: 0
                max_int: 999
                description: 'Desired Minimum TX Interval.This is the minimum interval, in ms, that the system would like to use when transmitting BFD control packets.'
                example: 100
          - class_name: bfdAuthP
            doc_path: Routing%20and%20Forwarding/bfd:AuthP/
            rn: auth
            type: single
            tf_name: authentication
            description: 'BFD authentication policy.'
            attributes:
              - nxos_name: authInterop
                tf_name: authentication_interop
                type: String
                description: 'Auth Interop Enable Disable on BFD Interface.'
                enum_values:
                  - disable
                  - enable
                example: enable
              - nxos_name: hexKey
                tf_name: authentication_hex_key
                type: String
                write_only: true
                sensitive: true
                exclude_test: true
                description: 'A property to indicate Authentication Hex Key for the BFD session.'
                example: 'AB'
              - nxos_name: hexKeySize
                tf_name: authentication_hex_key_size
                type: Int64
                min_int: 0
                max_int: 40
                exclude_test: true
                description: 'A property to indicate Authentication Hex Key Size.'
                example: 1
              - nxos_name: key
                tf_name: authentication_key
                type: String
                write_only: true
                sensitive: true
                description: 'A property to indicate Authentication Key for the BFD session.'
                example: 'secret_key'
              - nxos_name: keyId
                tf_name: authentication_key_id
                type: Int64
                min_int: 1
                max_int: 255
                description: 'Authentication Key ID to be used in the BFD session.'
                example: 5
              - nxos_name: type
                tf_name: authentication_type
                type: String
                description: 'Authentication Type of the BFD session.'
                enum_values:
                  - none
                  - sha1
                  - met-sha1
                example: sha1
test_prerequisites:
  - dn: sys/fm/bfd
    class_name: fmBfd
    no_delete: true
    attributes:
      - name: adminSt
        value: enabled
  - dn: sys/intf/lb-[lo10]
    class_name: l3LbRtdIf
    dependencies: [0]
    attributes:
      - name: id
        value: lo10
  - dn: sys/fm/ifvlan
    class_name: fmInterfaceVlan
    dependencies: [1]
    attributes:
      - name: adminSt
        value: enabled
  - dn: sys/intf/svi-[vlan10]
    class_name: sviIf
    dependencies: [2]
    attributes:
      - name: id
        value: vlan10
