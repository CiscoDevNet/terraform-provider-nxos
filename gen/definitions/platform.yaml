      - TEMPLATE_MPLS_SCALE
      - TEMPLATE_INTERNET_PEERING
      - TEMPLATE_MULTICAST_EXT_HEAVY
      - TEMPLATE_L3_HEAVY
      - TEMPLATE_MULTICAST_DUAL_STACK
      - TEMPLATE_L2_HEAVY
      - TEMPLATE_L2_SCALE
