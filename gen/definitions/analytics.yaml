---
name: Analytics
class_name: analyticsEntity
dn: sys/analytics
no_delete: true
ds_description: This data source can read the Analytics configuration on NX-OS devices, including instances, profiles, events, policies, and traffic analytics.
res_description: This resource can manage the Analytics configuration on NX-OS devices, including instances, profiles, events, policies, and traffic analytics.
doc_path: System/analytics:Entity/
doc_category: Monitoring
test_tags: [ANALYTICS]
child_classes:
  - class_name: analyticsInst
    rn: inst-[%s]
    type: list
    tf_name: instances
    description: 'Holds the Analytics instance information.'
    doc_path: System/analytics:Inst/
    attributes:
      - nxos_name: mode
        tf_name: mode
        type: String
        id: true
        description: 'Mode Select to represent the feature.'
        enum_values:
          - analytics
          - netflow
        example: analytics
      - nxos_name: adminSt
        tf_name: admin_state
        type: String
        description: 'The administrative state of the object or policy.'
        enum_values:
          - enabled
          - disabled
        example: enabled
      - nxos_name: collectTunnelHeader
        tf_name: collect_tunnel_header
        type: Bool
        description: 'Enable collection of tunnel header data on QP_AR.'
        example: true
      - nxos_name: ctrl
        tf_name: control
        type: String
        description: 'The control state.'
        enum_values:
          - stateful-ha
        allow_non_enum_values: true
        example: stateful-ha
      - nxos_name: enableAnalyticsSubmode
        tf_name: enable_analytics_submode
        type: Bool
        description: 'Enable Analytics Submode funxtionality.'
        example: true
      - nxos_name: geneveEnable
        tf_name: geneve_enable
        type: Bool
        description: 'Enable parsing of Geneve header mentioned in RFC8926.'
        example: true
      - nxos_name: timeOut
        tf_name: timeout
        type: Int64
        min_int: 5
        max_int: 60
        description: 'Flow timeout in seconds.'
        example: 30
    child_classes:
      - class_name: analyticsProfile
        rn: prof-[%s]
        type: list
        tf_name: profiles
        description: 'Profile.'
        doc_path: System/analytics:Profile/
        attributes:
          - nxos_name: name
            tf_name: name
            type: String
            id: true
            description: 'Object name.'
            example: 'PROFILE1'
          - nxos_name: burstIntvlShift
            tf_name: burst_interval_shift
            type: Int64
            min_int: 0
            max_int: 255
            description: 'Timestamp Shift Value for Burst Interval.'
            example: 10
          - nxos_name: collectIntvl
            tf_name: collect_interval
            type: Int64
            min_int: 100
            max_int: 64000
            description: 'Collect Interval in Milliseconds.'
            example: 200
          - nxos_name: descr
            tf_name: description
            type: String
            description: 'Description of the specified attribute.'
            example: 'My profile'
          - nxos_name: ipPktIdShift
            tf_name: ip_packet_id_shift
            type: Int64
            min_int: 0
            max_int: 255
            description: 'Analytics IP Packet Id Shift.'
            example: 10
          - nxos_name: mtu
            tf_name: mtu
            type: Int64
            min_int: 576
            max_int: 9216
            description: 'MTU for the Analytics flow record packets.'
            example: 1500
          - nxos_name: seqNumGuessThreshHi
            tf_name: sequence_number_guess_threshold_high
            type: Int64
            min_int: 0
            max_int: 4294967295
            description: 'Sequence Number Guess Threshold High.'
            example: 100
          - nxos_name: seqNumGuessThreshLo
            tf_name: sequence_number_guess_threshold_low
            type: Int64
            min_int: 0
            max_int: 4294967295
            description: 'Sequence Number Guess Threshold Low.'
            example: 50
          - nxos_name: srcPort
            tf_name: source_port
            type: Int64
            min_int: 1
            max_int: 65535
            description: 'Source L4 Port for the Analytics packets.'
            example: 10000
      - class_name: analyticsEvents
        rn: events-[%s]
        type: list
        tf_name: events
        description: 'Configure FTE Events Information.'
        doc_path: System/analytics:Events/
        attributes:
          - nxos_name: name
            tf_name: name
            type: String
            id: true
            description: 'Object name.'
            example: 'EVENTS1'
          - nxos_name: aclDrops
            tf_name: acl_drops
            type: Bool
            description: 'Configure the capture acl-drops in fte-event-drop-events mode for FTE Event.'
            example: true
          - nxos_name: blackHole
            tf_name: black_hole
            type: Bool
            description: 'Configure the capture blackhole in fte-event-drop-events mode for FTE Record.'
            example: true
          - nxos_name: bufferDrops
            tf_name: buffer_drops
            type: Bool
            description: 'Configure the capture buffer-drops in fte-event-drop-events mode for FTE Record.'
            example: true
          - nxos_name: descr
            tf_name: description
            type: String
            description: 'Description of the specified attribute.'
            example: 'My events'
          - nxos_name: eventExportMax
            tf_name: event_export_max
            type: Int64
            min_int: 0
            max_int: 32000
            description: 'Configure FTE Event Export Max Value.'
            example: 10
          - nxos_name: fwdDrops
            tf_name: forward_drops
            type: Bool
            description: 'Configure the capture forward-drops in fte-event-drop-events mode for FTE Record.'
            example: true
          - nxos_name: groupDropEvents
            tf_name: group_drop_events
            type: Bool
            description: 'Configure the group drop events for FTE Event.'
            example: true
          - nxos_name: groupLatencyEvents
            tf_name: group_latency_events
            type: Bool
            description: 'Configure the group latency events for FTE Event.'
            example: true
          - nxos_name: groupPacketEvents
            tf_name: group_packet_events
            type: Bool
            description: 'Configure the group packet events for FT Event.'
            example: true
          - nxos_name: ipDf
            tf_name: ip_dont_fragment
            type: Bool
            description: 'Configuration to capture events with IP: Don''t Fragment flag.'
            example: true
          - nxos_name: latencyThreshold
            tf_name: latency_threshold
            type: Int64
            min_int: 0
            max_int: 65535
            description: 'Configure FTE Latency Threshold limit.'
            example: 100
          - nxos_name: latencyThresholdUnit
            tf_name: latency_threshold_unit
            type: String
            description: 'Configure FTE Latency Threshold Unit.'
            enum_values:
              - micro-sec
              - milli-sec
            example: milli-sec
          - nxos_name: receiveWindowZero
            tf_name: receive_window_zero
            type: Bool
            description: 'Configuration to capture events for TCP receive window zero.'
            example: true
          - nxos_name: tos
            tf_name: tos
            type: Int64
            min_int: 0
            max_int: 255
            description: 'Configuration to capture events with given IP DSCP values.'
            example: 10
          - nxos_name: tosEnable
            tf_name: tos_enable
            type: Bool
            description: 'Configuration to enable events with given IP DSCP values.'
            example: true
          - nxos_name: ttlMatchEnable
            tf_name: ttl_match_enable
            type: Bool
            description: 'Configuration to enable ttl match events.'
            example: true
          - nxos_name: ttlMatchValue
            tf_name: ttl_match_value
            type: Int64
            min_int: 0
            max_int: 255
            description: 'Configuration to capture events for given ttl value.'
            example: 10
      - class_name: analyticsPolicy
        rn: policy-[%s]
        type: list
        tf_name: policies
        description: 'Policy.'
        doc_path: System/analytics:Policy/
        attributes:
          - nxos_name: name
            tf_name: name
            type: String
            id: true
            description: 'Object name.'
            example: 'POLICY1'
          - nxos_name: descr
            tf_name: description
            type: String
            description: 'Description of the specified attribute.'
            example: 'My policy'
      - class_name: analyticsRecordP
        rn: recordp-[%s]
        type: list
        tf_name: records
        description: 'Flow Record.'
        doc_path: System/analytics:RecordP/
        attributes:
          - nxos_name: name
            tf_name: name
            type: String
            id: true
            description: 'Object name.'
            example: 'RECORD1'
          - nxos_name: collect
            tf_name: collect
            type: String
            description: 'Analytics Record parameters to collect in the flows.'
            enum_values:
              - count-bytes
              - count-pkts
              - sampler-id
              - pkt-disp
              - ts-first
              - ts-recent
              - tcp-flags
              - src-intf
              - ingress-vrf-id
            allow_non_enum_values: true
            example: count-bytes
          - nxos_name: descr
            tf_name: description
            type: String
            description: 'Description of the specified attribute.'
            example: 'My record'
          - nxos_name: match
            tf_name: match
            type: String
            description: 'Analytics Record profile parameters to match flows on.'
            enum_values:
              - ethertype
              - dst-mac
              - src-mac
              - vlan
              - proto
              - tos
              - src-ipv4
              - dst-ipv4
              - src-ipv6
              - dst-ipv6
              - src-port
              - dst-port
              - src-ip
              - dst-ip
            allow_non_enum_values: true
            example: src-ipv4
      - class_name: analyticsCollector
        rn: collector-[%s]
        type: list
        tf_name: collectors
        description: 'Collector entry.'
        doc_path: System/analytics:Collector/
        attributes:
          - nxos_name: name
            tf_name: name
            type: String
            id: true
            description: 'Object name.'
            example: 'COLLECTOR1'
          - nxos_name: descr
            tf_name: description
            type: String
            description: 'Description of the specified attribute.'
            example: 'My collector'
          - nxos_name: dscp
            tf_name: dscp
            type: Int64
            min_int: 0
            max_int: 63
            description: 'DSCP value of the Remote Collector.'
            example: 46
          - nxos_name: dstAddr
            tf_name: destination_address
            type: String
            description: 'Destination IP of the Remote Collector.'
            example: '10.1.1.1'
          - nxos_name: dstPort
            tf_name: destination_port
            type: Int64
            min_int: 0
            max_int: 65535
            description: 'L4 Port of the Remote Collector.'
            example: 5640
          - nxos_name: eventDstPort
            tf_name: event_destination_port
            type: Int64
            min_int: 0
            max_int: 65535
            description: 'Event L4 Port of the Remote Collector.'
            example: 5695
          - nxos_name: inbandInterface
            tf_name: inband_interface
            type: Bool
            description: 'Inband interface for exporter.'
            example: false
          - nxos_name: srcAddr
            tf_name: source_address
            type: String
            description: 'Source IP Address for Analytics packets.'
            example: '10.1.1.2'
          - nxos_name: srcIf
            tf_name: source_interface
            type: String
            description: 'Source Interface that contains the Source IP for Analytics packets.'
            example: 'lo0'
          - nxos_name: v9
            tf_name: v9
            type: Bool
            description: 'Export FT and FTE data in V9 format.'
            example: false
          - nxos_name: ver
            tf_name: version
            type: String
            description: 'Collector Version Format.'
            enum_values:
              - v5
              - v9
              - cisco-v1
            example: v9
          - nxos_name: vrfName
            tf_name: vrf_name
            type: String
            description: 'VRF to connect to the Remote Collector.'
            example: 'default'
      - class_name: analyticsMonitor
        rn: monitor-[%s]
        type: list
        tf_name: monitors
        description: 'Flow Monitor.'
        doc_path: System/analytics:Monitor/
        attributes:
          - nxos_name: name
            tf_name: name
            type: String
            id: true
            description: 'Object name.'
            example: 'MONITOR1'
          - nxos_name: descr
            tf_name: description
            type: String
            description: 'Description of the specified attribute.'
            example: 'My monitor'
        child_classes:
          - class_name: analyticsRsRecordPAtt
            rn: rtrecordPAtt
            type: single
            tf_name: record
            description: 'Record Policy Attachment.'
            doc_path: System/analytics:RsRecordPAtt/
            attributes:
              - nxos_name: tDn
                tf_name: record_target_dn
                type: String
                description: 'Target distinguished name of the record.'
                example: 'sys/analytics/inst-analytics/recordp-RECORD1'
          - class_name: analyticsCollectorBucket
            rn: collectorbucket-[%v]
            type: list
            tf_name: collector_buckets
            description: 'Flow Collector Bucket Entry.'
            doc_path: System/analytics:CollectorBucket/
            attributes:
              - nxos_name: id
                tf_name: id
                type: Int64
                id: true
                min_int: 1
                max_int: 255
                description: 'Flow Collector Bucket Id.'
                example: 1
              - nxos_name: descr
                tf_name: description
                type: String
                description: 'Description of the specified attribute.'
                example: 'My bucket'
              - nxos_name: hashHi
                tf_name: hash_high
                type: Int64
                min_int: 0
                max_int: 4294967295
                description: 'Collector Bucket Hash High Value.'
                example: 4294967295
              - nxos_name: hashLo
                tf_name: hash_low
                type: Int64
                min_int: 0
                max_int: 4294967295
                description: 'Collector Bucket Hash Low Value.'
                example: 0
            child_classes:
              - class_name: analyticsRsCollectorAtt
                rn: rtcollectorAtt-[%s]
                type: list
                tf_name: collectors
                description: 'Reference to Collector.'
                doc_path: System/analytics:RsCollectorAtt/
                attributes:
                  - nxos_name: tDn
                    tf_name: target_dn
                    type: String
                    id: true
                    description: 'Target distinguished name of the collector.'
                    example: 'sys/analytics/inst-analytics/collector-COLLECTOR1'
      - class_name: analyticsTrafficAnalytics
        rn: trafficanalytics
        type: single
        tf_name: traffic_analytics
        description: 'Traffic Analytics.'
        doc_path: System/analytics:TrafficAnalytics/
        attributes:
          - nxos_name: descr
            tf_name: traffic_analytics_description
            type: String
            description: 'Description of the specified attribute.'
            example: 'My traffic analytics'
          - nxos_name: interfaceMode
            tf_name: traffic_analytics_interface_mode
            type: Bool
            description: 'Enable interface traffic analytics.'
            example: true
          - nxos_name: name
            tf_name: traffic_analytics_name
            type: String
            description: 'Object name.'
            example: 'TA1'
          - nxos_name: serviceDbSize
            tf_name: traffic_analytics_service_database_size
            type: Int64
            min_int: 1
            max_int: 5000
            description: 'Maximum number of flows.'
            example: 1000
          - nxos_name: troubleshootExportInterval
            tf_name: traffic_analytics_troubleshoot_export_interval
            type: Int64
            min_int: 10
            max_int: 60
            description: 'Troubleshoot flows export interval.'
            example: 30
          - nxos_name: udpPortList
            tf_name: traffic_analytics_udp_port_list
            type: String
            description: 'UDP Port List.'
            example: '1234'
      - class_name: analyticsFwdInstTarget
        rn: fwdinst-[%v]
        type: list
        tf_name: forward_instance_targets
        description: 'Forward Instance Target.'
        doc_path: System/analytics:FwdInstTarget/
        attributes:
          - nxos_name: id
            tf_name: id
            type: Int64
            id: true
            min_int: 0
            max_int: 16777215
            description: 'Analytics Target identifier.'
            example: 1
          - nxos_name: DefPolicy
            tf_name: default_policy
            type: String
            description: 'Default Filtering Policy.'
            enum_values:
              - permit
              - deny
            example: deny
          - nxos_name: collectorId
            tf_name: collector_id
            type: Int64
            min_int: 0
            max_int: 4294967295
            description: 'Analytics exporter Id to identify the exporting hardware instance.'
            example: 1
          - nxos_name: dir
            tf_name: direction
            type: String
            description: 'Analytics profile direction.'
            enum_values:
              - in
              - out
              - both
            example: out
          - nxos_name: fltType
            tf_name: filter_type
            type: String
            description: 'Analytics Target filter type.'
            enum_values:
              - ipv4
              - ipv6
              - ce
            example: ipv6
          - nxos_name: instanceName
            tf_name: instance_name
            type: String
            description: 'Interface details to identify the hardware instance.'
            example: 'Ethernet1/1'
          - nxos_name: switchLatency
            tf_name: switch_latency
            type: Bool
            description: 'Switch latency mode is applied at system level.'
            example: true
          - nxos_name: systemExporterId
            tf_name: system_exporter_id
            type: Int64
            min_int: 0
            max_int: 4294967295
            description: 'Base exporter Id applied at system level.'
            example: 201
          - nxos_name: trafficAnalytics
            tf_name: traffic_analytics_enabled
            type: Bool
            description: 'Traffic Analytics mode is applied at system level.'
            example: true
        child_classes:
          - class_name: analyticsRsMonitorAtt
            rn: rtmonitorAtt
            type: single
            tf_name: monitor_attachment
            description: 'Reference to Monitor.'
            doc_path: System/analytics:RsMonitorAtt/
            attributes:
              - nxos_name: tDn
                tf_name: monitor_attachment_target_dn
                type: String
                description: 'Target Monitor DN. For example: `sys/analytics/inst-[analytics]/monitor-[MONITOR1]`.'
                example: sys/analytics/inst-[analytics]/monitor-[MONITOR1]
          - class_name: analyticsRsProfAtt
            rn: rtprofAtt
            type: single
            tf_name: profile_attachment
            description: 'Reference to profile.'
            doc_path: System/analytics:RsProfAtt/
            attributes:
              - nxos_name: tDn
                tf_name: profile_attachment_target_dn
                type: String
                description: 'Target Profile DN. For example: `sys/analytics/inst-[analytics]/prof-[PROFILE1]`.'
                example: sys/analytics/inst-[analytics]/prof-[PROFILE1]
          - class_name: analyticsRsEventsAtt
            rn: rteventsAtt
            type: single
            tf_name: events_attachment
            description: 'Reference to FTE Events.'
            doc_path: System/analytics:RsEventsAtt/
            attributes:
              - nxos_name: tDn
                tf_name: events_attachment_target_dn
                type: String
                description: 'Target Events DN. For example: `sys/analytics/inst-[analytics]/events-[EVENTS1]`.'
                example: sys/analytics/inst-[analytics]/events-[EVENTS1]
          - class_name: analyticsRsPolicyAtt
            rn: rtpolicyAtt
            type: single
            tf_name: policy_attachment
            description: 'Reference to policy.'
            doc_path: System/analytics:RsPolicyAtt/
            attributes:
              - nxos_name: tDn
                tf_name: policy_attachment_target_dn
                type: String
                description: 'Target Policy DN. For example: `sys/analytics/inst-[analytics]/policy-[POLICY1]`.'
                example: sys/analytics/inst-[analytics]/policy-[POLICY1]
test_prerequisites:
  - dn: sys/fm/analytics
    class_name: fmAnalytics
    no_delete: true
    attributes:
      - name: adminSt
        value: enabled
