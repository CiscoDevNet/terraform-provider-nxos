---
name: NXAPI
class_name: nxapiInst
dn: sys/nxapi
no_delete: true
ds_description: This data source can read the NX-API configuration on NX-OS devices, including VRF, HTTP/HTTPS ports, SSL settings, certificate configuration, and client certificate authentication.
res_description: This resource can manage the NX-API configuration on NX-OS devices, including VRF, HTTP/HTTPS ports, SSL settings, certificate configuration, and client certificate authentication.
doc_path: System/nxapi:Inst/
doc_category: System
attributes:
  - nxos_name: useVrf
    tf_name: vrf
    type: String
    description: 'Vrf for NX-API.'
    example: management
    exclude_test: true
  - nxos_name: httpPort
    tf_name: http_port
    type: Int64
    description: 'HTTP Port.'
    min_int: -1
    max_int: 65535
    example: 80
    exclude_test: true
  - nxos_name: httpsPort
    tf_name: https_port
    type: Int64
    description: 'HTTPS Port.'
    min_int: -1
    max_int: 65535
    example: 443
    exclude_test: true
  - nxos_name: idleTimeout
    tf_name: idle_timeout
    type: Int64
    description: 'Specifies the idle timeout (in minutes) before a session expires.'
    min_int: 1
    max_int: 1440
    example: 10
    exclude_test: true
  - nxos_name: certEnable
    tf_name: certificate_enable
    type: Bool
    description: 'Certificate status of NX-API.'
    example: false
    exclude_test: true
  - nxos_name: certFile
    tf_name: certificate_file
    type: String
    description: 'Certificate file for NX-API.'
    example: bootflash:server.crt
    exclude_test: true
  - nxos_name: keyFile
    tf_name: key_file
    type: String
    description: 'Key file for NX-API.'
    example: bootflash:server.key
    exclude_test: true
  - nxos_name: encrKeyPassphrase
    tf_name: encrypted_key_passphrase
    type: String
    write_only: true
    sensitive: true
    description: 'Passphrase to decrypt the encrypted key file for NX-API.'
    example: mypassphrase
    exclude_test: true
  - nxos_name: trustpoint
    tf_name: trustpoint
    type: String
    description: 'Trustpoint label for NX-API.'
    example: mytrustpoint
    exclude_test: true
  - nxos_name: sslProtocols
    tf_name: ssl_protocols
    type: String
    description: 'String of space separated SSL protocols to be supported.'
    example: TLSv1.2
    exclude_test: true
  - nxos_name: sslCiphersWeak
    tf_name: ssl_ciphers_weak
    type: Bool
    description: 'Enable Weak Ciphers for SSL.'
    example: false
    exclude_test: true
  - nxos_name: clientCertAuth
    tf_name: client_certificate_authentication
    type: String
    description: 'Enable Mutual SSL Certificate Authentication for NXAPI between client and server and set verficiation restriction level.'
    enum_values:
      - "off"
      - optional
      - strict
      - two-step
    example: optional
    exclude_test: true
  - nxos_name: sudi
    tf_name: sudi
    type: Bool
    description: 'SUDI support for nginx.'
    example: false
    exclude_test: true
