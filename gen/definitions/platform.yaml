      - QS_PORT_MODE_48X10G_4X40G
      - QS_PORT_MODE_52X10G_3X40g
      - QS_PORT_MODE_56X10G_2X40G
      - QS_PORT_MODE_60X10G_1X40G
      - QS_PORT_MODE
      - QG_PORT_MODE_32X10G_8X40G
      - QG_PORT_MODE_16X40G
      - QG_PORT_MODE_16X10G_12X40G
      - QG_PORT_MODE_8X10G_14X40G
      - NEP_PORT_MODE_32X40G
      - NEP_PORT_MODE_24X40G
      - NEP_PORT_MODE_26X40G
      - NEP_PORT_MODE_32X40G_FIXED
      - QI2_PORT_MODE_72X10G
      - QI2_PORT_MODE_48X10G_6x40G
      - QI2_PORT_MODE_BKOUT
      - DV_PORT_MODE_48X25G_4X100G
      - DV_PORT_MODE_48X25G_2X100G_4X40G
      - PB_PORT_MODE_48X10G_6X100G
      - PB_PORT_MODE_48X10G_4X100G_2X40G
      - FOST_PORT_MODE_28X40G_4X100G
      - FOST_PORT_MODE_18X100G
      - FOST_PORT_MODE_24X40G_6X100G
      - TET_PORT_MODE_64X100G
      - TET_PORT_MODE_96X25G_32X100G
      - TET_PORT_MODE_128X25G
      - CMR_PORT_MODE_128X100G_32X400G
      - CMR_PORT_MODE_160X25G_8X100G
      - CMR_PORT_MODE_128X100G_30X400G_2X200G
    example: QS_PORT_MODE_64X10G
    exclude_test: true
  - nxos_name: profileTuple
    tf_name: profile_tuple
    type: String
    description: 'Profile tuple for platform entity.'
    enum_values:
      - Disable
      - Enable
    example: Enable
    exclude_test: true
  - nxos_name: pstatCfg
    tf_name: pstat_configuration
