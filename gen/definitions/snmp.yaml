---
name: SNMP
class_name: snmpEntity
dn: sys/snmp
no_delete: true
ds_description: This data source can read the SNMP configuration on NX-OS devices, including system information, global settings, local users, user groups, hosts, and trap configuration.
res_description: This resource can manage the SNMP configuration on NX-OS devices, including system information, global settings, local users, user groups, hosts, and trap configuration.
doc_path: System/snmp:Entity/
doc_category: Monitoring
attributes:
  - nxos_name: adminSt
    tf_name: admin_state
    type: String
    description: 'The administrative state of the object or policy.'
    enum_values:
      - enabled
      - disabled
    example: enabled
child_classes:
  - class_name: snmpInst
    doc_path: System/snmp:Inst/
    rn: inst
    type: single
    no_delete: true
    tf_name: instance
    description: 'SNMP instance configuration.'
    attributes:
      - nxos_name: adminSt
        tf_name: instance_admin_state
        type: String
        description: 'Indicates the administrative state of the SNMP policy.'
        enum_values:
          - enabled
          - disabled
        example: enabled
      - nxos_name: descr
        tf_name: description
        type: String
        description: 'Description of the specified attribute.'
        example: 'My SNMP instance'
      - nxos_name: engId
        tf_name: engine_id
        type: String
        description: 'Engine Id.'
        example: '00:00:00:63:00:01:00:10:20:15:10:03'
      - nxos_name: loggingLevel
        tf_name: logging_level
        type: String
        description: 'Set level for SNMP syslog messages.'
        enum_values:
          - emergencies
          - alerts
          - critical
          - errors
          - warnings
          - notifications
          - information
          - debugging
        example: warnings
      - nxos_name: ownerKey
        tf_name: owner_key
        type: String
        description: 'The key for enabling clients to own their data for entity correlation.'
        example: 'key1'
      - nxos_name: ownerTag
        tf_name: owner_tag
        type: String
        description: 'A tag for enabling clients to add their own data. For example, to indicate who created this object.'
        example: 'tag1'
      - nxos_name: unknownEngId
        tf_name: unknown_engine_id
        type: String
        description: 'Indicates the Unknown Engine Id MO thats needs to be created.'
        enum_values:
          - "no"
          - "yes"
        example: "no"
      - nxos_name: unknownUser
        tf_name: unknown_user
        type: String
        description: 'Indicates the Unknown User MO thats needs to be created.'
        enum_values:
          - "no"
          - "yes"
        example: "no"
    child_classes:
      - class_name: snmpSysInfo
        doc_path: System/snmp:SysInfo/
        rn: sysinfo
        type: single
        no_delete: true
        tf_name: system_info
        description: 'SNMP system information.'
        attributes:
          - nxos_name: sysContact
            tf_name: contact
            type: String
            description: 'System Contact.'
            example: 'admin@example.com'
          - nxos_name: sysDescription
            tf_name: system_info_description
            type: String
            description: 'System Description.'
            example: 'My NX-OS device'
          - nxos_name: sysLocation
            tf_name: location
            type: String
            description: 'System Location.'
            example: 'DC1-Room42'
      - class_name: snmpGlobals
        doc_path: System/snmp:Globals/
        rn: globals
        type: single
        no_delete: true
        tf_name: globals
        description: 'SNMP global settings.'
        attributes:
          - nxos_name: pktSize
            tf_name: packet_size
            type: Int64
            min_int: 484
            max_int: 17382
            description: 'Packet size config.'
            example: 8192
          - nxos_name: disableSnmpAaaSync
            tf_name: disable_aaa_sync
            type: String
            description: 'Disable sync of user creation/updation between SNMP and AAA.'
            enum_values:
              - "no"
              - "yes"
            example: "yes"
          - nxos_name: enforcePrivacy
            tf_name: enforce_privacy
            type: String
            description: 'Globally enforce privacy for all the users.'
            enum_values:
              - "no"
              - "yes"
            example: "yes"
          - nxos_name: tcpSessionAuth
            tf_name: tcp_session_authentication
            type: String
            description: 'tcp-session auth config.'
            enum_values:
              - "no"
              - tcpSessAuth
            example: tcpSessAuth
        child_classes:
          - class_name: snmpSourceInterfaceTraps
            doc_path: System/snmp:SourceInterfaceTraps/
            rn: srcInterfaceTraps
            type: single
            no_delete: true
            tf_name: source_interface_traps
            description: 'SNMP source interface for traps.'
            attributes:
              - nxos_name: ifname
                tf_name: source_interface_traps
                type: String
                description: 'Source interface name for Traps.'
                example: eth1/1
      - class_name: snmpLocalUser
