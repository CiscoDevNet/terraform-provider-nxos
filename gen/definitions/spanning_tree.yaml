---
name: Spanning Tree
class_name: stpEntity
dn: sys/stp
no_delete: true
ds_description: This data source can read the Spanning Tree configuration on NX-OS devices, including per-interface settings such as BPDU filter, BPDU guard, cost, guard mode, and port priority.
res_description: This resource can manage the Spanning Tree configuration on NX-OS devices, including per-interface settings such as BPDU filter, BPDU guard, cost, guard mode, and port priority.
doc_path: Discovery%20Protocols/stp:Entity/
doc_category: Switching
attributes:
  - nxos_name: adminSt
    tf_name: admin_state
    type: String
    enum_values:
      - enabled
      - disabled
    description: "The administrative state of the object or policy."
    example: enabled
child_classes:
  - class_name: stpInst
    rn: inst
    type: single
    no_delete: true
    tf_name: instance
    description: 'Spanning Tree instance configuration.'
    doc_path: Discovery%20Protocols/stp:Inst/
    attributes:
      - nxos_name: adminSt
        tf_name: instance_admin_state
        type: String
        enum_values:
          - enabled
          - disabled
        description: "The administrative state of the object or policy."
        example: enabled
      - nxos_name: bridge
        tf_name: bridge_assurance
        type: String
        enum_values:
          - enabled
          - disabled
        description: "Enable spanning-tree bridge assurance on all ports."
        example: disabled
      - nxos_name: ctrl
        tf_name: control
        type: String
        enum_values:
          - normal
          - stateful-ha
          - extchp-edge
          - extchp-bpdu-filter
          - extchp-bpdu-guard
        allow_non_enum_values: true
        description: "The control state."
        example: "normal,stateful-ha"
      - nxos_name: fcoe
        tf_name: fcoe
        type: String
        enum_values:
          - enabled
          - disabled
        description: "Disable spanning tree for fcoe vlan."
        example: enabled
      - nxos_name: l2GStpDomId
        tf_name: l2_gateway_stp_domain_id
        type: Int64
        min_int: 0
        max_int: 200000000
        description: "Spanning tree L2 Gateway Domain Id."
        example: 2048
      - nxos_name: lcIssu
        tf_name: linecard_issu
        type: String
        enum_values:
          - default
          - disruptive
          - non-disruptive
          - auto
        description: "Linecard ISSU type."
        example: auto
      - nxos_name: loopguard
        tf_name: loopguard
        type: String
        enum_values:
          - enabled
          - disabled
        description: "Enable loop guard on all ports."
        example: enabled
      - nxos_name: mode
        tf_name: mode
        type: String
        enum_values:
          - mst
          - pvrst
        description: "Spanning tree mode."
        example: pvrst
      - nxos_name: pathcostOp
        tf_name: pathcost_option
        type: String
        enum_values:
          - auto
          - short
          - long
        description: "Spanning tree pathcost options."
        example: long
    child_classes:
      - class_name: stpIf
        rn: if-[%s]
        type: list
        no_delete: true
        tf_name: interfaces
        description: 'List of Spanning Tree interfaces.'
        doc_path: Discovery%20Protocols/stp:If/
        attributes:
          - nxos_name: id
            tf_name: interface_id
            type: String
            id: true
            description: "Must match first field in the output of `show intf brief`. Example: `eth1/1`."
            example: eth1/9
          - nxos_name: bpdufilter
            tf_name: bpdu_filter
            type: String
            enum_values:
              - default
              - enable
              - disable
            description: "bpdufilter mode."
            example: enable
          - nxos_name: bpduguard
            tf_name: bpdu_guard
            type: String
            enum_values:
              - default
              - enable
              - disable
            description: "Guard Mode."
            example: enable
          - nxos_name: cost
            tf_name: cost
            type: Int64
            min_int: 0
            max_int: 200000000
            description: "Port Path Cost."
            example: 100
          - nxos_name: guard
            tf_name: guard
            type: String
            enum_values:
              - default
              - root
              - loop
              - none
            description: "Guard Mode."
            example: root
          - nxos_name: linkType
            tf_name: link_type
            type: String
            enum_values:
              - auto
              - p2p
              - shared
            description: "Link Type."
            example: p2p
          - nxos_name: mode
            tf_name: mode
            type: String
            enum_values:
              - default
              - edge
              - network
              - normal
              - trunk
            description: "Port mode."
            example: edge
          - nxos_name: priority
            tf_name: priority
            type: Int64
            min_int: 0
            max_int: 224
            description: "Port Priority."
            example: 200
          - nxos_name: ctrl
            tf_name: control
            type: String
            enum_values:
              - unspecified
              - bpdu-guard
              - bpdu-filter
            allow_non_enum_values: true
            description: "Interface controls."
            example: bpdu-guard
          - nxos_name: descr
            tf_name: description
            type: String
            description: "Description."
            example: "My interface description"
          - nxos_name: lcIssu
            tf_name: linecard_issu
            type: String
            enum_values:
              - default
              - disruptive
              - non-disruptive
              - auto
            description: "Port lc issu."
            example: auto
          - nxos_name: prestdCfg
            tf_name: prestandard_configuration
            type: String
            enum_values:
              - enabled
              - disabled
            description: "Port mst prestd."
            example: enabled
          - nxos_name: simulatePvst
            tf_name: simulate_pvst
            type: String
            enum_values:
              - default
              - enabled
              - disabled
            description: "Port simulate pvst."
            example: enabled
      - class_name: stpVlan
        rn: vlan-[%v]
        type: list
        no_delete: true
        tf_name: vlans
        description: 'Per-VLAN Spanning Tree configuration.'
        doc_path: Discovery%20Protocols/stp:Vlan/
        attributes:
          - nxos_name: id
            tf_name: vlan_id
            type: Int64
            id: true
            min_int: 1
            max_int: 4096
            description: "Access Encapsulation."
            example: 100
          - nxos_name: adminSt
            tf_name: admin_state
            type: String
            enum_values:
              - enabled
              - disabled
            description: "The administrative state of the object or policy."
            example: disabled
          - nxos_name: diameter
            tf_name: diameter
            type: Int64
            min_int: 2
            max_int: 7
            description: "network diameter."
            example: 3
          - nxos_name: enabledIntf
            tf_name: enabled_interfaces
            type: String
            exclude_test: true
            description: "Interfaces that have vlan cost/priority enabled."
            example: "eth1/9"
          - nxos_name: fwdTime
            tf_name: forward_time
            type: Int64
            min_int: 4
            max_int: 30
            description: "STP forward delay."
            example: 20
          - nxos_name: helloTime
            tf_name: hello_time
            type: Int64
            min_int: 1
            max_int: 10
            description: "STP Hello interval."
            example: 5
          - nxos_name: maxAge
            tf_name: max_age
            type: Int64
            min_int: 6
            max_int: 40
            description: "STP max age interval."
            example: 25
          - nxos_name: priority
            tf_name: priority
            type: String
            enum_values:
              - "0"
              - "4096"
              - "8192"
              - "12288"
              - "16384"
              - "20480"
              - "24576"
              - "28672"
              - "32768"
              - "36864"
              - "40960"
              - "45056"
              - "49152"
              - "53248"
              - "57344"
              - "61440"
            description: "Bridge Priority."
            example: "4096"
          - nxos_name: rootMode
            tf_name: root_mode
            type: String
            exclude_test: true
            enum_values:
              - disabled
              - enabled
            description: "Bridge Root Config mode."
            example: enabled
          - nxos_name: rootType
            tf_name: root_type
            type: String
            exclude_test: true
            enum_values:
              - none
              - primary
              - secondary
            description: "Bridge Root Type."
            example: primary
test_prerequisites:
  - dn: sys/intf/phys-[eth1/9]
    class_name: l1PhysIf
    attributes:
      - name: layer
        value: Layer2
