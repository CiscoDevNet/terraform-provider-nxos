---
name: Ttag
class_name: ttagTtagEntity
dn: sys/ttag
no_delete: true
test_tags: [TTAG]
ds_description: 'This data source can read the PTP ttag configuration on NX-OS devices, including per-interface ttag settings for underlay and overlay traffic.'
res_description: 'This resource can manage the PTP ttag configuration on NX-OS devices, including per-interface ttag settings for underlay and overlay traffic.'
doc_path: Interfaces/ttag:TtagEntity/
doc_category: Interface
attributes:
  - nxos_name: ttagMarkerInterval
    tf_name: ttag_marker_interval
    type: Int64
    description: 'PTP ttag marker interval in seconds.'
    min_int: 1
    max_int: 25200
    example: 120
child_classes:
  - class_name: ttagTtagIf
    doc_path: Interfaces/ttag:TtagIf/
    rn: if-[%s]
    type: list
    tf_name: ttag_interfaces
    description: 'Per-interface PTP ttag configuration and management.'
    attributes:
      - nxos_name: id
        tf_name: interface_id
        type: String
        id: true
        description: 'Interface id of port with PTP configuration.'
        example: eth1/10
      - nxos_name: ttag
        tf_name: ttag
        type: Bool
        description: 'TTAG header for underlay traffic (outer) on interface.'
        example: true
      - nxos_name: ttagInner
        tf_name: ttag_inner
        type: Bool
        description: 'TTAG header for overlay traffic (inner) on interface.'
        example: false
      - nxos_name: ttagMarker
        tf_name: ttag_marker
        type: Bool
        description: 'Ttag marker packet on interface.'
        example: false
      - nxos_name: ttagStrip
        tf_name: ttag_strip
        type: Bool
        description: 'Strip ttag from egress packet on this interface.'
        example: false
