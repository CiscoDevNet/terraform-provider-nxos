---
name: Physical Interface
class_name: interfaceEntity
dn: sys/intf
no_delete: true
ds_description: This data source can read the configuration of physical interfaces on NX-OS devices, including settings such as speed, duplex, MTU, switchport mode, and VLAN assignments.
res_description: This resource can manage physical interfaces on NX-OS devices, including settings such as speed, duplex, MTU, switchport mode, and VLAN assignments.
doc_category: Interface
child_classes:
  - class_name: l1PhysIf
    doc_path: System/l1:PhysIf/
    rn: phys-[%s]
    type: list
    no_delete: true
    tf_name: physical_interfaces
    description: 'List of physical interfaces.'
    attributes:
      - nxos_name: id
        tf_name: interface_id
        type: String
        id: true
        description: 'Must match first field in the output of `show intf brief`. Example: `eth1/1`.'
        example: eth1/10
      - nxos_name: FECMode
        tf_name: fec_mode
        type: String
        description: 'FEC Mode.'
        enum_values:
          - fc-fec
          - rs-fec
          - fec-off
          - auto
          - rs-ieee
          - rs-cons16
          - kp-fec
        example: auto
      - nxos_name: accessVlan
        tf_name: access_vlan
        type: String
        description: 'Configured Access Vlan. Possible values are `unknown`, `vlan-XX` or `vxlan-XX`.'
        example: unknown
      - nxos_name: adminSt
        tf_name: admin_state
        type: String
        description: 'Administrative port state.'
        enum_values:
          - down
          - up
        example: down
      - nxos_name: autoNeg
        tf_name: auto_negotiation
        type: String
        description: 'Administrative port auto-negotiation.'
        enum_values:
          - 'on'
          - 'off'
          - 25G
        example: 'on'
      - nxos_name: bw
        tf_name: bandwidth
        type: Int64
        description: 'The bandwidth parameter for a routed interface, port channel, or subinterface.'
        min_int: 0
        max_int: 3200000000
        example: 1000
      - nxos_name: delay
        tf_name: delay
        type: Int64
        description: 'The administrative port delay time.'
        min_int: 1
        max_int: 16777215
        example: 10
      - nxos_name: descr
        tf_name: description
        type: String
        description: 'Interface description.'
        example: My Description
      - nxos_name: duplex
        tf_name: duplex
        type: String
        description: 'Duplex.'
        enum_values:
          - auto
          - full
          - half
        example: auto
      - nxos_name: layer
        tf_name: layer
        type: String
        description: 'Administrative port layer.'
        enum_values:
          - Layer1
          - Layer2
          - Layer3
        example: Layer3
      - nxos_name: linkLog
        tf_name: link_logging
        type: String
        description: 'Administrative link logging enable.'
        enum_values:
          - default
          - enable
          - disable
        example: enable
      - nxos_name: linkDebounce
        tf_name: link_debounce_down
        type: Int64
        description: 'Administrative port link debounce interval.'
        min_int: 0
        max_int: 20000
        example: 200
      - nxos_name: linkDebounceLinkUp
        tf_name: link_debounce_up
        type: Int64
        description: 'Link Debounce Interval - LinkUp Event.'
        min_int: 0
        max_int: 10000
        example: 0
      - nxos_name: medium
        tf_name: medium
        type: String
        description: 'The administrative port medium type.'
        enum_values:
          - broadcast
          - p2p
        example: broadcast
      - nxos_name: mode
        tf_name: mode
        type: String
        description: 'Administrative port mode.'
        enum_values:
          - access
          - trunk
          - fex-fabric
          - dot1q-tunnel
          - promiscuous
          - host
          - trunk_secondary
          - trunk_promiscuous
          - vntag
        example: access
      - nxos_name: mtu
        tf_name: mtu
        type: Int64
        description: 'Administrative port mtu.'
        min_int: 576
        max_int: 9216
        example: 1500
      - nxos_name: nativeVlan
        tf_name: native_vlan
        type: String
        description: 'Configured Native Vlan. Possible values are `unknown`, `vlan-XX` or `vxlan-XX`.'
        example: unknown
      - nxos_name: speed
        tf_name: speed
        type: String
        description: 'Administrative port speed.'
        enum_values:
          - unknown
          - 100M
          - 1G
          - 10G
          - 40G
          - auto
          - auto 100M
          - auto 100M 1G
          - 100G
          - 25G
          - 10M
          - 50G
          - 200G
          - 400G
          - 2.5G
          - 5G
          - auto 2.5G 5G 10G
          - auto 100M 1G 2.5G 5G
          - 800G
        example: auto
      - nxos_name: speedGroup
        tf_name: speed_group
        type: String
        description: 'Speed Group.'
        enum_values:
          - unknown
          - '1000'
          - '10000'
          - '40000'
          - auto
          - '25000'
        example: auto
      - nxos_name: trunkVlans
        tf_name: trunk_vlans
        type: String
        description: 'Configed Trunk Vlans.'
        example: 1-4094
      - nxos_name: uniDirectionalEthernet
        tf_name: uni_directional_ethernet
        type: String
        description: 'UDE (Uni-Directional Ethernet).'
        enum_values:
          - disable
          - send-only
          - receive-only
        example: disable
      - nxos_name: userCfgdFlags
        tf_name: user_configured_flags
        type: String
        description: 'Port User Config Flags.'
        enum_values:
          - none
          - admin_state
          - admin_layer
          - admin_router_mac
          - admin_dce_mode
          - admin_mtu
        allow_non_enum_values: true
        example: 'admin_layer,admin_mtu,admin_state'
      - nxos_name: beacon
        tf_name: beacon
        type: String
        description: 'Beacon State.'
        enum_values:
          - 'on'
          - 'off'
        example: 'off'
      - nxos_name: dfeAdaptiveTuning
        tf_name: dfe_adaptive_tuning
        type: String
        description: 'DFE (Decision Feedback Equalizer) Adaptive Tuning.'
        enum_values:
          - disable
          - enable
        example: disable
      - nxos_name: dfeTuningDelay
        tf_name: dfe_tuning_delay
        type: Int64
        description: 'DFE (Decision Feedback Equalizer) Tuning Delay.'
        min_int: 100
        max_int: 10000
        example: 500
      - nxos_name: dot1qEtherType
        tf_name: dot1q_ether_type
        type: Int64
        description: 'The administrative port Dot1q ether-type. Dot1q Ether Type configures the TPID value in the VLAN tag field for packets received and sent by the interface.'
        min_int: 1536
        max_int: 65535
        example: 33024
        exclude_test: true
      - nxos_name: equalizationDelay
        tf_name: equalization_delay
        type: Int64
        description: 'Administrative port equalization delay time.'
        min_int: 0
        max_int: 31
        example: 1
        exclude_test: true
      - nxos_name: inhBw
        tf_name: inherit_bandwidth
        type: Int64
        description: 'Administrative port inherit bandwidth.'
        min_int: 0
        max_int: 4294967295
        example: 1000
      - nxos_name: ituChannel
        tf_name: itu_channel
        type: Int64
        description: 'ITU Channel to support DWDM XCVR.'
        min_int: 1
        max_int: 96
        example: 50
      - nxos_name: linkActiveJitterMgmt
        tf_name: link_active_jitter_management
        type: String
        description: 'Administrative port link active-jitter-management.'
        enum_values:
          - disable
          - enable
        example: disable
      - nxos_name: linkFlapErrDis
        tf_name: link_flap_error_disable
        type: String
        description: 'Enable/Disable Link Flap Error Config.'
        enum_values:
          - disable
          - enable
        example: disable
      - nxos_name: linkFlapErrorMax
        tf_name: link_flap_error_max
        type: Int64
        description: 'Max Flaps allowed per time.'
        min_int: 2
        max_int: 30
        example: 10
      - nxos_name: linkFlapErrorSeconds
        tf_name: link_flap_error_seconds
        type: Int64
        description: 'Time Allowed for max flaps.'
        min_int: 5
        max_int: 420
        example: 60
      - nxos_name: linkLoopback
        tf_name: link_loopback
        type: String
        description: 'Link loopback configuration.'
        enum_values:
          - disable
          - enable
        example: disable
      - nxos_name: linkMacUpTimer
        tf_name: link_mac_up_timer
        type: Int64
        description: 'Administrative port link mac-up timer.'
        min_int: 0
        max_int: 120
        example: 10
      - nxos_name: linkMaxBringUpTimer
        tf_name: link_max_bring_up_timer
        type: Int64
        description: 'Administrative port link mac-up timer max.'
        min_int: 0
        max_int: 120
        example: 10
      - nxos_name: linkTransmitReset
        tf_name: link_transmit_reset
        type: String
        description: 'Link Transmit Reset.'
        enum_values:
          - disable
          - enable
        example: enable
      - nxos_name: mdix
        tf_name: mdix
        type: String
        description: 'The administrative Mdix mode. The Medium-dependant interface crossover (Mdix) is when the interface automatically detects the required cable connection type (straight through or crossover) and configures the connection appropriately.'
        enum_values:
          - auto
          - mdi
          - mdi-x
        example: auto
      - nxos_name: mediaType
        tf_name: media_type
        type: String
        description: 'Phy interfaces media type.'
        enum_values:
          - none
          - 10g-tx
        example: none
      - nxos_name: opticsLoopback
        tf_name: optics_loopback
        type: String
        description: 'Configured Loopback.'
        enum_values:
          - disable
          - internal
          - line
        example: disable
      - nxos_name: packetTimestampEgressSourceId
        tf_name: packet_timestamp_egress_source_id
        type: Int64
        description: 'Egress timestamp Source Id.'
        min_int: 0
        max_int: 8388606
        example: 100
      - nxos_name: packetTimestampIngressSourceId
        tf_name: packet_timestamp_ingress_source_id
        type: Int64
        description: 'Ingress timestamp Source Id.'
        min_int: 0
        max_int: 8388606
        example: 100
      - nxos_name: packetTimestampState
        tf_name: packet_timestamp_state
        type: String
        description: 'Packet timestamp feature state.'
        enum_values:
          - disable
          - enable-ingress
          - enable-egress
          - enable-both
        example: disable
      - nxos_name: portT
        tf_name: port_type
        type: String
        description: 'Type of the port: Fabric vs Leaf.'
        enum_values:
          - unknown
          - eobc
          - mgmt
          - fab
          - leaf
          - extchhp
          - extchfp
        example: unknown
      - nxos_name: routerMac
        tf_name: router_mac
        type: String
        description: 'The administrative router MAC address.'
        example: not-applicable
      - nxos_name: snmpTrapSt
        tf_name: snmp_trap_state
        type: String
        description: 'Administrative port snmp trap state.'
        enum_values:
          - enable
          - disable
        example: enable
      - nxos_name: spanMode
        tf_name: span_mode
        type: String
        description: 'Administrative port span mode.'
        enum_values:
          - not-a-span-dest
          - span-dest
          - span-dest-fwd
          - span-dest-fwd-learn
        example: not-a-span-dest
      - nxos_name: squelch
        tf_name: squelch
        type: String
        description: 'Configured Squelch.'
        enum_values:
          - enable
          - disable
        example: enable
      - nxos_name: transMode
        tf_name: transparent_mode
        type: String
        description: 'Administrative port layer1 mode.'
        enum_values:
          - not-a-trans-port
          - trans-port
        example: not-a-trans-port
      - nxos_name: trunkLog
        tf_name: trunk_logging
        type: String
        description: 'Administrative trunk logging enable.'
        enum_values:
          - default
          - enable
          - disable
        example: default
      - nxos_name: usage
        tf_name: usage
        type: String
        description: 'The port usage type.'
        enum_values:
          - discovery
          - epg
          - fabric
          - infra
          - controller
          - blacklist
        allow_non_enum_values: true
        example: discovery
      - nxos_name: voicePortCos
        tf_name: voice_port_cos
        type: Int64
        description: 'Voice Port Cos.'
        min_int: -1
        max_int: 7
        example: 0
      - nxos_name: voicePortTrust
        tf_name: voice_port_trust
        type: String
        description: 'Voice Port Trust.'
        enum_values:
          - disable
          - enable
        example: disable
      - nxos_name: voiceVlanId
        tf_name: voice_vlan_id
        type: Int64
        description: 'Voice VLAN ID.'
        min_int: 0
        max_int: 4092
        example: 0
      - nxos_name: voiceVlanType
        tf_name: voice_vlan_type
        type: String
        description: 'Voice vlan type.'
        enum_values:
          - none
          - tagged
          - dot1p
          - untagged
        example: none
    child_classes:
      - class_name: nwRtVrfMbr
        rn: rtvrfMbr
        type: single
        doc_path: Routing%20and%20Forwarding/nw:RtVrfMbr/
        attributes:
          - nxos_name: tDn
            tf_name: vrf_dn
            type: String
            description: 'DN of VRF. For example: `sys/inst-VRF1`.'
            example: sys/inst-default
      - class_name: l1StormCtrlP
        rn: stormctrlp
        type: single
        tf_name: storm_control
        description: 'Storm Control Policy.'
        doc_path: System/l1:StormCtrlP/
        attributes:
          - nxos_name: burstPps
            tf_name: storm_control_burst_packets_per_second
            type: Int64
            description: 'Max burst size.'
            min_int: 0
            max_int: 4294967295
            example: 600
          - nxos_name: burstRate
            tf_name: storm_control_burst_rate
            type: String
            description: 'Max burst size.'
            example: '75.000000'
          - nxos_name: rate
            tf_name: storm_control_rate
            type: String
            description: 'Traffic rate.'
            example: '50.000000'
          - nxos_name: ratePps
            tf_name: storm_control_rate_packets_per_second
            type: Int64
            description: 'Tarffic rate.'
            min_int: 0
            max_int: 4294967295
            example: 500
          - nxos_name: type
            tf_name: storm_control_packet_type
            type: String
            description: 'Packet Type.'
            enum_values:
              - bcast
              - unk-ucast
              - mcast
              - all
            example: bcast
      - class_name: nvoMultisiteIfTracking
        doc_path: Network%20Virtualization/nvo:MultisiteIfTracking/
        rn: multisiteiftracking
        type: single
        tf_name: multisite_interface_tracking
        description: 'Tracking for Multisite DCI and Fabric Interfaces.'
        attributes:
          - nxos_name: tracking
            tf_name: multisite_interface_tracking
            type: String
            description: 'Configure EVPN multisite tracking for DCI/Fabric interface.'
            exclude_test: true
            enum_values:
              - unknown
              - dci
              - fabric
            example: dci
      - class_name: l1PhysIfExtended
        rn: physExtd
        type: single
        tf_name: extended
        description: 'Physical interface extended configuration.'
        doc_path: System/l1:PhysIfExtended/
        attributes:
          - nxos_name: allowMultiTag
            tf_name: allow_multi_tag
            type: String
            description: 'Allow Multitag.'
            enum_values:
              - disable
              - enable
            exclude_test: true
            example: enable
          - nxos_name: autoExcludeVlans
            tf_name: auto_exclude_vlans
            type: String
            description: 'Switchport Autostate Exclude vlans.'
            exclude_test: true
            example: '1-2'
          - nxos_name: bufferBoost
            tf_name: buffer_boost
            type: String
            description: 'Disable/enable buffer boost on interface.'
            enum_values:
              - disable
              - enable
            exclude_test: true
            example: disable
          - nxos_name: chassisModuleSerial
            tf_name: chassis_module_serial
            type: String
            description: 'Module serial number information.'
            exclude_test: true
            example: 'FDO12345678'
          - nxos_name: chassisModuleSide
            tf_name: chassis_module_side
            type: String
            description: 'Module Side information.'
            enum_values:
              - UnknownSlot
              - LeftIoModuleSlot
              - RightIoModuleSlot
            exclude_test: true
            example: LeftIoModuleSlot
          - nxos_name: chassisNumber
            tf_name: chassis_number
            type: Int64
            description: 'Chassis number information.'
            min_int: 0
            max_int: 255
            exclude_test: true
            example: 1
          - nxos_name: chassisProfileName
            tf_name: chassis_profile_name
            type: String
            description: 'Profile name information.'
            exclude_test: true
            example: 'profile1'
          - nxos_name: chassisSerial
            tf_name: chassis_serial
            type: String
            description: 'Serial number information.'
            exclude_test: true
            example: 'FDO12345678'
          - nxos_name: descr
            tf_name: extended_description
            type: String
            description: 'Description.'
            example: 'Extended interface config'
          - nxos_name: flowCtrlReceive
            tf_name: flow_control_receive
            type: Bool
            description: 'Disable/enable rx flowcontrol block on interface.'
            exclude_test: true
            example: true
          - nxos_name: flowCtrlSend
            tf_name: flow_control_send
            type: Bool
            description: 'Disable/enable tx flowcontrol block on interface.'
            exclude_test: true
            example: true
          - nxos_name: flowRedirect
            tf_name: flow_redirect
            type: Bool
            description: 'Disable/enable flowredirect on interface.'
            exclude_test: true
            example: true
          - nxos_name: gtpHashMode
            tf_name: gtp_hash_mode
            type: String
            description: 'Gtp hash mode ipv4 or ipv6 on interface.'
            enum_values:
              - disable
              - v4
              - v6
            exclude_test: true
            example: v4
          - nxos_name: l3McastReceiverVlan
            tf_name: layer3_multicast_receiver_vlan
            type: Int64
            description: 'Set vlan ID used for L3 multicast on this interface.'
            min_int: 0
            max_int: 4094
            exclude_test: true
            example: 100
          - nxos_name: portTypeExternal
            tf_name: port_type_external
            type: String
            description: 'Identifies if or not the port is a external-facing port.'
            enum_values:
              - "no"
              - "yes"
            exclude_test: true
            example: "yes"
          - nxos_name: portTypeFabric
            tf_name: port_type_fabric
            type: String
            description: 'Identifies if or not the port is a fabric-facing port.'
            enum_values:
              - "no"
              - "yes"
            exclude_test: true
            example: "yes"
          - nxos_name: routerMacIpv6Extract
            tf_name: router_mac_ipv6_extract
            type: String
            description: 'Disable/enable switchport ipv6 extract.'
            enum_values:
              - disable
              - enable
            exclude_test: true
            example: enable
          - nxos_name: shutDownLan
            tf_name: shut_down_lan
            type: String
            description: 'Shut/Unshut all LAN VLANs on interface.'
            enum_values:
              - disable
              - enable
            exclude_test: true
            example: enable
          - nxos_name: stormCtrlAct
            tf_name: storm_control_action
            type: String
            description: 'Storm control action.'
            enum_values:
              - none
              - shutdown
              - trap
            allow_non_enum_values: true
            exclude_test: true
            example: shutdown
          - nxos_name: stormCtrlAct1
            tf_name: storm_control_action_1
            type: String
            description: 'Storm control action1.'
            enum_values:
              - none
              - shutdown
              - trap
            allow_non_enum_values: true
            exclude_test: true
            example: shutdown
          - nxos_name: stormCtrlAct2
            tf_name: storm_control_action_2
            type: String
            description: 'Storm control action2.'
            enum_values:
              - none
              - shutdown
              - trap
            allow_non_enum_values: true
            exclude_test: true
            example: shutdown
          - nxos_name: stormCtrlBCastLevel
            tf_name: storm_control_broadcast_level
            type: String
            description: 'storm-control broadcast level.'
            exclude_test: true
            example: '50.000000'
          - nxos_name: stormCtrlBCastLevel1
            tf_name: storm_control_broadcast_level_1
            type: String
            description: 'storm-control broadcast level1.'
            exclude_test: true
            example: '40.000000'
          - nxos_name: stormCtrlBCastLevel2
            tf_name: storm_control_broadcast_level_2
            type: String
            description: 'storm-control broadcast level2.'
            exclude_test: true
            example: '40.000000'
          - nxos_name: stormCtrlBCastPPS
            tf_name: storm_control_broadcast_packets_per_second
            type: Int64
            description: 'storm-control broadcast PPS.'
            min_int: 0
            max_int: 4294967295
            exclude_test: true
            example: 1000
          - nxos_name: stormCtrlMCastLevel
            tf_name: storm_control_multicast_level
            type: String
            description: 'storm-control multicast level.'
            exclude_test: true
            example: '50.000000'
          - nxos_name: stormCtrlMCastLevel1
            tf_name: storm_control_multicast_level_1
            type: String
            description: 'storm-control multicast level1.'
            exclude_test: true
            example: '40.000000'
          - nxos_name: stormCtrlMCastLevel2
            tf_name: storm_control_multicast_level_2
            type: String
            description: 'storm-control multicast level2.'
            exclude_test: true
            example: '40.000000'
          - nxos_name: stormCtrlMCastPPS
            tf_name: storm_control_multicast_packets_per_second
            type: Int64
            description: 'storm-control multicast PPS.'
            min_int: 0
            max_int: 4294967295
            exclude_test: true
            example: 1000
          - nxos_name: stormCtrlUCastLevel
            tf_name: storm_control_unicast_level
            type: String
            description: 'Storm control unicast level.'
            exclude_test: true
            example: '50.000000'
          - nxos_name: stormCtrlUCastLevel1
            tf_name: storm_control_unicast_level_1
            type: String
            description: 'Storm control unicast level1.'
            exclude_test: true
            example: '40.000000'
          - nxos_name: stormCtrlUCastLevel2
            tf_name: storm_control_unicast_level_2
            type: String
            description: 'Storm control unicast level2.'
            exclude_test: true
            example: '40.000000'
          - nxos_name: stormCtrlUCastPPS
            tf_name: storm_control_unicast_packets_per_second
            type: Int64
            description: 'Storm control unicast PPS.'
            min_int: 0
            max_int: 4294967295
            exclude_test: true
            example: 1000
          - nxos_name: switchportBlock
            tf_name: switchport_block
            type: String
            description: 'Disable/enable switchport block on interface.'
            enum_values:
              - none
              - multicast
              - unicast
            allow_non_enum_values: true
            exclude_test: true
            example: multicast
          - nxos_name: switchportIsolated
            tf_name: switchport_isolated
            type: String
            description: 'Switchport Isolated.'
            enum_values:
              - disable
              - enable
            exclude_test: true
            example: enable
          - nxos_name: switchportMacLearn
            tf_name: switchport_mac_learn
            type: String
            description: 'Disable/enable mac learning on interface.'
            enum_values:
              - disable
              - enable
            exclude_test: true
            example: disable
          - nxos_name: switchportMacPermit
            tf_name: switchport_mac_permit
            type: String
            description: 'Switchport mac-address permit related configuration.'
            enum_values:
              - all
              - static-only
            exclude_test: true
            example: static-only
          - nxos_name: switchportVirtualEthernetBridge
            tf_name: switchport_virtual_ethernet_bridge
            type: String
            description: 'Disable/enable switchport virtual ethernet bridge on interface.'
            enum_values:
              - disable
              - enable
            exclude_test: true
            example: enable
