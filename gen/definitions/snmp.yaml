        description: 'List of SNMP local users.'
        attributes:
          - nxos_name: userName
            tf_name: name
            type: String
            id: true
            description: 'snmp-server user name.'
            example: user1
          - nxos_name: authpwd
            tf_name: authentication_password
            type: String
            write_only: true
            sensitive: true
            description: 'Auth Password.'
            example: 'Xe9$mK2v!pQr'
          - nxos_name: authtype
            tf_name: authentication_type
            type: String
            description: 'Auth Protocol Type.'
            enum_values:
              - "no"
              - md5
              - sha
              - sha-256
              - sha-224
              - sha-384
              - sha-512
            example: md5
          - nxos_name: ipv4AclName
            tf_name: ipv4_acl_name
            type: String
            description: 'IPv4 ACL name to filter SNMP requests.'
            example: 'snmp-acl-v4'
          - nxos_name: ipv6AclName
            tf_name: ipv6_acl_name
            type: String
            description: 'IPv6 ACL name to filter SNMP requests.'
            example: 'snmp-acl-v6'
          - nxos_name: isenforcepriv
            tf_name: enforce_privacy
            type: Bool
            description: 'whether enforce priv con.'
            example: false
          - nxos_name: islocalizedV2key
            tf_name: localized_v2_key
            type: Bool
            description: 'whether localized V2 key configured.'
            example: false
            exclude_test: true
          - nxos_name: islocalizedkey
            tf_name: localized_key
            type: Bool
            description: 'whether localized key configured.'
            example: false
            exclude_test: true
          - nxos_name: privpwd
            tf_name: privacy_password
            type: String
            write_only: true
            sensitive: true
            description: 'Priv Password.'
            example: 'Yt4&nL8w!kDs'
          - nxos_name: privtype
            tf_name: privacy_type
            type: String
            description: 'Priv Protocol Type.'
            enum_values:
              - "no"
              - des
              - aes128
              - aes256
            example: des
          - nxos_name: pwd_type
            tf_name: password_type
            type: Int64
            min_int: 0
            max_int: 65535
            description: 'Password encryption type.'
            example: 0
          - nxos_name: usrengineId
            tf_name: engine_id
            type: String
            description: 'Configured Engine Id.'
            example: '00:00:00:63:00:01:00:10:20:15:10:03'
            exclude_test: true
          - nxos_name: usrengineIdlen
            tf_name: engine_id_length
            type: Int64
            min_int: 0
            max_int: 162
            description: 'Configured Engine Id len.'
            example: 0
            exclude_test: true
        child_classes:
          - class_name: snmpUserGroup
            doc_path: System/snmp:UserGroup/
            rn: group-[%s]
            type: list
            tf_name: groups
            description: 'List of SNMP user groups.'
            attributes:
              - nxos_name: groupName
