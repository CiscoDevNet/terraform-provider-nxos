---
name: Platform
class_name: platformEntity
dn: sys/pltfm
no_delete: true
ds_description: This data source can read the platform configuration on NX-OS devices, including hardware profiles, TCAM regions, NVE platform settings, and extended platform entity configuration.
res_description: This resource can manage the platform configuration on NX-OS devices, including hardware profiles, TCAM regions, NVE platform settings, and extended platform entity configuration.
doc_path: System/platform%3AEntity/
doc_category: System
attributes:
  - nxos_name: accessListMatchInnerHeader
    tf_name: access_list_match_inner_header
    type: String
    description: 'Used to enable/disable hardware access-list match inner-header.'
    enum_values:
      - disable
      - enable
    example: enable
    exclude_test: true
  - nxos_name: aclTapAggregation
    tf_name: acl_tap_aggregation
    type: String
    description: 'Configure tap-aggregation feature.'
    enum_values:
      - disable
      - enable
    example: enable
    exclude_test: true
  - nxos_name: descr
    tf_name: description
    type: String
    description: 'Container to hold platform data of apps.'
    example: 'My platform'
    exclude_test: true
  - nxos_name: disParseErr
    tf_name: disable_parse_error
    type: String
    description: 'Used to disable/enable hardware profile disable parse-err.'
    enum_values:
      - disable
      - enable
    example: enable
    exclude_test: true
  - nxos_name: globalTxSpan
    tf_name: global_tx_span
    type: String
    description: 'Used to enable/disable hardware multicast global tx span.'
    enum_values:
      - disable
      - enable
    example: enable
    exclude_test: true
  - nxos_name: highMulticastPriority
    tf_name: high_multicast_priority
    type: String
    description: 'high mcast priority.'
    enum_values:
      - enabled
      - disabled
    example: enabled
    exclude_test: true
  - nxos_name: hwLouResThreshold
    tf_name: hardware_lou_resource_threshold
    type: Int64
    description: 'Hardware Lou Resource Threshold value.'
    min_int: 1
    max_int: 50
    example: 10
    exclude_test: true
  - nxos_name: iBdIfaclLblOpt
    tf_name: ingress_bd_ifacl_label_optimization
    type: String
    description: 'To optimize the ingress QOS Ingress BD IFACL label size.'
    enum_values:
      - disable
      - enable
    example: enable
    exclude_test: true
  - nxos_name: iRaclSize
    tf_name: ingress_racl_size
    type: String
    description: 'To set the ingress RACL TCAM label size to 9 bits and the default value is 6 bits.'
    enum_values:
      - disable
      - enable
    example: enable
    exclude_test: true
  - nxos_name: ingRepRoundRobin
    tf_name: ingress_replication_round_robin
    type: Bool
    description: 'Round-Robin hashing of underlay-paths for VXLAN ingress-replication peers.'
    example: "true"
    exclude_test: true
  - nxos_name: ipStatistics
    tf_name: ip_statistics
    type: String
    description: 'Used to disable/enable hardware forwarding ip statistics.'
    enum_values:
      - disable
      - enable
    example: enable
    exclude_test: true
  - nxos_name: ipv6AlpmCarveValue
    tf_name: ipv6_alpm_carve_value
    type: Int64
    description: 'Hardware profile ipv6 alpm carve-value.'
    min_int: 0
    max_int: 4096
    example: 128
    exclude_test: true
  - nxos_name: ipv6LpmMaxEntries
    tf_name: ipv6_lpm_max_entries
    type: Int64
    description: 'Maximum limit for IPv6 LPM routes.'
    min_int: 0
    max_int: 6144
    example: 1024
    exclude_test: true
  - nxos_name: lpmMaxLimit
    tf_name: lpm_max_limit
    type: Int64
    description: 'Maximum limit for LPM routes.'
    min_int: 0
    max_int: 4096
    example: 1024
    exclude_test: true
  - nxos_name: mcastDcsCheck
    tf_name: multicast_dcs_check
    type: String
    description: 'Used to enable/disable system mcast DCS check.'
    enum_values:
      - disable
      - enable
    example: enable
    exclude_test: true
  - nxos_name: mcastFlexStats
    tf_name: multicast_flex_stats
    type: String
    description: 'Used to enable/disable hardware profile multicast flex-stats.'
    enum_values:
      - disable
      - enable
    example: enable
    exclude_test: true
  - nxos_name: mcastLpmMaxEntries
    tf_name: multicast_lpm_max_entries
    type: Int64
    description: 'Maximum limit for multicast LPM routes.'
    min_int: 0
    max_int: 4096
    example: 1024
    exclude_test: true
  - nxos_name: mcastNlb
    tf_name: multicast_nlb
    type: String
    description: 'Used to enable/disable hardware profile multicast nlb.'
    enum_values:
      - disable
      - enable
    example: enable
    exclude_test: true
  - nxos_name: mcastRaclBridge
    tf_name: multicast_racl_bridge
    type: String
    description: 'Apply permit/drop for mcast bridged pkt.'
    enum_values:
      - enabled
      - disabled
    example: enabled
    exclude_test: true
  - nxos_name: mldSnooping
    tf_name: mld_snooping
    type: String
    description: 'Used to enable/disable system mld snooping.'
    enum_values:
      - disable
      - enable
    example: enable
    exclude_test: true
  - nxos_name: mplsAdjStatsMode
    tf_name: mpls_adjacency_stats_mode
    type: String
    description: 'Corresponds to MPLS Adjacency stats type.'
    enum_values:
      - PACKETS
      - BYTES
    example: BYTES
    exclude_test: true
  - nxos_name: mplsCfgEcmpMode
    tf_name: mpls_ecmp_mode
    type: String
    description: 'Used to enable/disable extended-ecmp for MPLS on RX-series Linecards N9K.'
    enum_values:
      - invalid
      - disable
      - enable
    example: enable
    exclude_test: true
  - nxos_name: mroutingDisableL2Upd
    tf_name: mrouting_disable_l2_update
    type: String
    description: 'Corresponds to enabling/disabling l2 update.'
    enum_values:
      - disable
      - enable
    example: enable
    exclude_test: true
  - nxos_name: mroutingDisableSecRouteUpd
    tf_name: mrouting_disable_second_route_update
    type: String
    description: 'Corresponds to enabling/disabling second route update.'
    enum_values:
      - disable
      - enable
    example: enable
    exclude_test: true
  - nxos_name: mroutingPerfMode
    tf_name: mrouting_performance_mode
    type: String
    description: 'Corresponds to enabling/disabling mrouting performance mode.'
    enum_values:
      - disable
      - enable
    example: enable
    exclude_test: true
  - nxos_name: multicastMaxLimit
    tf_name: multicast_max_limit
    type: Int64
    description: 'Maximum limit for multicast LPM routes.'
    min_int: 0
    max_int: 8000
    example: 2048
    exclude_test: true
  - nxos_name: multicastRpfCheckOptimization
    tf_name: multicast_rpf_check_optimization
    type: String
    description: 'mcast rpf check optimization.'
    enum_values:
      - enabled
      - disabled
    example: enabled
    exclude_test: true
  - nxos_name: multicastServiceReflectPort
    tf_name: multicast_service_reflect_port
    type: Int64
    description: 'mcast service-reflect port.'
    min_int: 0
    max_int: 48
    example: 10
    exclude_test: true
  - nxos_name: multicastSyslogThreshold
    tf_name: multicast_syslog_threshold
    type: Int64
    description: 'Specifies to generate a syslog entry when the specified maximum buffer size is exceeded for multicast cases. The default is 90 percent of the total available shared buffer.'
    min_int: 1
    max_int: 100
    example: 80
    exclude_test: true
  - nxos_name: openflowForwardPdu
    tf_name: openflow_forward_pdu
    type: String
    description: 'Configure openflow forward-pdu.'
    enum_values:
      - enabled
      - disabled
    example: enabled
    exclude_test: true
  - nxos_name: pbrSkipSelfIp
    tf_name: pbr_skip_self_ip
    type: String
    description: 'Configure Skipping PBR for self-ip packets.'
    enum_values:
      - enabled
      - disabled
    example: enabled
    exclude_test: true
  - nxos_name: pcFastConv
    tf_name: port_channel_fast_convergence
    type: String
    description: 'Port-channel Fast Convergence.'
    enum_values:
      - enable
      - disable
    example: enable
    exclude_test: true
  - nxos_name: pcLbAlgo
    tf_name: port_channel_load_balance_algorithm
    type: String
    description: 'Pc load-balance internal algorithm.'
    enum_values:
      - PC_LB_ALGO_DLB
      - PC_LB_ALGO_RTAG7
      - PC_LB_ALGO_RTAG7_MURMUR
      - PC_LB_ALGO_RTAG7_LOCAL_CRC
      - PC_LB_ALGO_DYNAMIC_PIN
    example: PC_LB_ALGO_RTAG7
    exclude_test: true
  - nxos_name: pcLbRes
    tf_name: port_channel_load_balance_resilient
    type: String
    description: 'Pc load-balance resilient.'
    enum_values:
      - "yes"
      - "no"
    example: "yes"
    exclude_test: true
  - nxos_name: pcMplsLbLabelIp
    tf_name: port_channel_mpls_load_balance_label_ip
    type: String
    description: 'Mpls load-balance label ip.'
    enum_values:
      - DEFAULT
      - LABEL_IP
    example: LABEL_IP
    exclude_test: true
  - nxos_name: pcMplsLbLabelOnly
    tf_name: port_channel_mpls_load_balance_label_only
    type: String
    description: 'Mpls load-balance label only.'
    enum_values:
      - DEFAULT
      - LABEL_ONLY
    example: LABEL_ONLY
    exclude_test: true
  - nxos_name: pcScaleFanout
    tf_name: port_channel_scale_fanout
    type: String
    description: 'Port-channel Scale Fanout.'
    enum_values:
      - enable
      - disable
    example: enable
    exclude_test: true
  - nxos_name: picCoreEnable
    tf_name: pic_core_enable
